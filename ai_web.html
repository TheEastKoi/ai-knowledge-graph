<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型 & AI Agent 知识网络 | 分层学习版</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            gap: 16px;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #header .tip {
            font-size: 13px;
            color: #64748b;
            flex: 1;
        }

        .mode-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            background: #334155;
        }

        .mode-btn.active {
            background: rgba(52, 211, 153, 0.2);
            border-color: #34d399;
            color: #34d399;
        }

        .mode-btn.interview.active {
            background: rgba(244, 114, 182, 0.2);
            border-color: #f472b6;
            color: #f472b6;
        }

        #container {
            display: flex;
            height: calc(100vh - 60px);
            margin-top: 60px;
        }

        #graph-container {
            flex: 1;
            position: relative;
        }

        /* 层级背景分隔线 */
        .level-guide {
            position: absolute;
            top: 0;
            bottom: 0;
            border-right: 1px dashed rgba(71, 85, 105, 0.3);
            pointer-events: none;
            z-index: 0;
        }

        .level-label {
            position: absolute;
            top: 15px;
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            pointer-events: none;
            z-index: 0;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
            position: relative;
            z-index: 1;
        }

        svg:active {
            cursor: grabbing;
        }

        .node circle {
            cursor: pointer;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .node:hover circle {
            filter: brightness(1.3);
        }

        .node text {
            font-size: 11px;
            fill: #e2e8f0;
            text-anchor: middle;
            pointer-events: none;
            font-weight: 500;
        }

        .link {
            stroke: #334155;
            stroke-width: 1.5px;
            stroke-opacity: 0.6;
        }

        .link.highlight {
            stroke: #60a5fa;
            stroke-opacity: 1;
            stroke-width: 2px;
        }

        .link.path-line {
            stroke: #34d399;
            stroke-opacity: 1;
            stroke-width: 2.5px;
        }

        .node.dimmed circle {
            opacity: 0.15;
        }

        .node.dimmed text {
            opacity: 0.15;
        }

        .link.dimmed {
            opacity: 0.1;
        }

        .node.path-focus circle {
            stroke: #34d399 !important;
            stroke-width: 4px !important;
            filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.6));
        }

        .node.interview-focus circle {
            stroke: #f472b6 !important;
            stroke-width: 4px !important;
            filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.6));
        }

        #detail-panel {
            width: 440px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid #1e293b;
            padding: 28px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #detail-panel.empty {
            opacity: 0.5;
        }

        #detail-panel h2 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #f1f5f9;
        }

        .level-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-bottom: 14px;
            font-weight: 500;
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        #detail-panel .category {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-bottom: 14px;
            margin-left: 6px;
            font-weight: 500;
        }

        .category-llm {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }

        .category-agent {
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
        }

        .category-base {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }

        #detail-panel .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-top: 18px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #detail-panel p {
            font-size: 14px;
            line-height: 1.7;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        #detail-panel ul {
            list-style: none;
            padding: 0;
        }

        #detail-panel li {
            padding: 5px 0;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            padding-left: 16px;
            position: relative;
        }

        #detail-panel li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #60a5fa;
        }

        .path-box {
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 10px 0;
        }

        .path-box h5 {
            font-size: 12px;
            color: #34d399;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .relation-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
            border-radius: 6px;
            font-size: 12px;
            margin: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .relation-tag:hover {
            background: rgba(96, 165, 250, 0.3);
        }

        .relation-tag.next {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        .relation-tag.next:hover {
            background: rgba(52, 211, 153, 0.3);
        }

        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            font-size: 12px;
            z-index: 50;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 460px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: rgba(51, 65, 85, 0.9);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            text-align: center;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .start-guide {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .start-guide h3 {
            font-size: 15px;
            color: #34d399;
            margin-bottom: 8px;
        }

        .start-guide p {
            font-size: 13px;
            color: #6ee7b7;
            margin: 0;
            line-height: 1.6;
        }

        .stage-card {
            margin-bottom: 16px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            padding: 12px 14px;
            border-left: 3px solid #34d399;
        }

        .stage-card h4 {
            font-size: 14px;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .keypoint-item {
            padding: 6px 10px;
            border-radius: 5px;
            margin: 4px 0;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .keypoint-item:hover {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🧠 大模型 & AI Agent 知识网络</h1>
        <span class="tip">从左到右递进学习 · 点击节点查看详情</span>
        <button class="mode-btn" id="guideBtn" onclick="toggleGuideMode()">🌱 学习引导模式</button>
        <button class="mode-btn interview" id="interviewBtn" onclick="toggleInterviewMode()">🎯 面试模式</button>
    </div>

    <div id="container">
        <div id="graph-container">
            <!-- 层级引导线 -->
            <div class="level-guide" style="left: 16%;"></div>
            <div class="level-guide" style="left: 36%;"></div>
            <div class="level-guide" style="left: 56%;"></div>
            <div class="level-guide" style="left: 76%;"></div>
            
            <div class="level-label" style="left: 5%;">第1层 · 入门基础</div>
            <div class="level-label" style="left: 25%;">第2层 · 核心原理</div>
            <div class="level-label" style="left: 45%;">第3层 · 关键组件</div>
            <div class="level-label" style="left: 65%;">第4层 · 进阶技术</div>
            <div class="level-label" style="left: 86%;">第5层 · 生产落地</div>
        </div>
        
        <div id="detail-panel" class="empty">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                <p>从左侧第一层开始学习</p>
                <p style="font-size: 13px; margin-top: 4px;">点击节点查看详细解释</p>
                <p style="font-size: 12px; margin-top: 12px; color: #34d399;">💡 推荐开启「学习引导模式」</p>
            </div>
        </div>
    </div>

    <div id="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background: #34d399;"></div>
            <span>核心基础概念</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #60a5fa;"></div>
            <span>大模型技术</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #a78bfa;"></div>
            <span>Agent 技术</span>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <button class="zoom-btn" onclick="resetZoom()">⟲</button>
    </div>

    <script>
        // ========== 知识数据（分层级） ==========
        // level: 1入门 2核心原理 3关键组件 4进阶技术 5生产落地
        const nodesData = [
            // ===== 第1层：入门基础 =====
            { id: "llm", name: "大语言模型 LLM", category: "base", level: 1,
              desc: "基于海量文本预训练的深度神经网络模型，核心能力是下一词预测，是当前人工智能的核心载体。拥有百亿级以上参数，具备语言理解、生成、推理等通用能力。",
              role: "整个AI领域的核心底座，为所有上层应用提供认知能力",
              prereq: [],
              next: ["transformer", "agent", "prompt-engineering"],
              relations: ["transformer", "pretrain", "sft", "agent", "rag"] },
            
            { id: "agent", name: "AI Agent", category: "base", level: 1,
              desc: "以大模型为大脑，具备自主感知、规划、工具调用、执行反馈能力的智能实体。能在无人干预下完成复杂长链路任务，是大模型从对话工具走向行动主体的核心形态。",
              role: "大模型的能力延伸，让大模型从「只会说话」变成「能做事」",
              prereq: ["llm"],
              next: ["planning", "memory", "toolcall"],
              relations: ["llm", "memory", "toolcall", "planning", "multiagent"] },

            // ===== 第2层：核心原理 =====
            { id: "math-foundation", name: "数学基础", category: "llm", level: 2,
              desc: "大模型的底层理论支撑，包含三大核心板块：线性代数（张量运算、矩阵乘法）、概率统计（交叉熵、KL散度）、优化理论（梯度下降、学习率）。",
              role: "理解模型原理、调参优化的底层根基",
              prereq: [],
              next: ["dl-foundation", "transformer"],
              relations: ["dl-foundation", "transformer"] },
            
            { id: "dl-foundation", name: "深度学习基础", category: "llm", level: 2,
              desc: "神经网络通用知识：反向传播、激活函数、损失函数、LayerNorm归一化、残差连接、正则化等，是理解Transformer的前置知识。",
              role: "从传统神经网络过渡到大模型的必备基础",
              prereq: ["math-foundation"],
              next: ["transformer"],
              relations: ["transformer"] },

            { id: "transformer", name: "Transformer 架构", category: "llm", level: 2,
              desc: "2017年提出的神经网络架构，核心是自注意力机制。所有主流大模型均基于此架构，解决了长文本依赖和并行计算问题。",
              role: "大模型的技术底座，决定模型基本能力上限",
              prereq: ["dl-foundation"],
              next: ["pretrain", "attention", "bpe"],
              relations: ["llm", "attention", "pretrain"] },
            
            { id: "attention", name: "自注意力机制", category: "llm", level: 2,
              desc: "Transformer的核心，让模型处理每个词时动态关注上下文中的相关词汇，自动计算权重关联。支持并行计算，大幅提升训练效率。",
              role: "模型理解语义关联的核心机制",
              prereq: ["transformer"],
              next: [],
              relations: ["transformer"] },

            // ===== 第3层：关键组件 =====
            { id: "pretrain", name: "预训练", category: "llm", level: 3,
              desc: "用海量通用文本进行无监督训练，目标是预测下一个词。模型在此阶段获得通用知识和语言能力，是成本最高也是能力最主要的来源。",
              role: "大模型能力的主要来源，一次训练长期复用",
              prereq: ["transformer"],
              next: ["sft", "emergence"],
              relations: ["llm", "sft"] },
            
            { id: "sft", name: "监督微调 SFT", category: "llm", level: 3,
              desc: "用高质量的指令-回答配对数据，对预训练模型进行小样本微调。让模型学会遵循人类指令，输出符合对话格式的内容。",
              role: "让基础模型变成可对话、可指令的助手模型",
              prereq: ["pretrain"],
              next: ["rlhf", "lora"],
              relations: ["pretrain", "rlhf", "lora"] },
            
            { id: "rlhf", name: "RLHF 对齐", category: "llm", level: 3,
              desc: "基于人类反馈的强化学习。通过人类标注排序数据训练奖励模型，再用强化学习微调大模型，让输出符合人类价值观。",
              role: "解决模型答非所问、有害输出、幻觉等问题",
              prereq: ["sft"],
              next: ["dpo"],
              relations: ["sft", "dpo"] },

            { id: "prompt-engineering", name: "提示词工程", category: "llm", level: 2,
              desc: "通过设计输入提示引导大模型输出预期结果的技术。核心技巧：角色设定、分步指令、Few-shot示例、格式约束、思维链引导。",
              role: "零成本提升大模型输出质量的核心手段",
              prereq: ["llm"],
              next: ["cot"],
              relations: ["llm", "cot", "agent"] },

            { id: "cot", name: "思维链 CoT", category: "llm", level: 3,
              desc: "通过分步思考的提示方式，让模型先写出推理过程再给出答案，大幅提升数学、逻辑等复杂推理的准确率。",
              role: "激发大模型推理能力的核心提示技术",
              prereq: ["prompt-engineering"],
              next: ["planning", "react"],
              relations: ["planning", "react"] },

            { id: "emergence", name: "涌现能力", category: "llm", level: 3,
              desc: "当模型参数规模和数据量达到阈值后，能力突然大幅提升的现象。包括上下文学习、指令遵循、复杂推理等小模型不具备的能力。",
              role: "大模型区别于传统AI的核心特征",
              prereq: ["pretrain"],
              next: [],
              relations: ["llm", "cot"] },

            { id: "bpe", name: "BPE 分词", category: "llm", level: 3,
              desc: "字节对编码，大模型主流的分词算法。将文本拆分为子词单元，平衡词汇表大小和序列长度，是文本输入模型前的必经步骤。",
              role: "文本与模型输入之间的转换桥梁",
              prereq: ["transformer"],
              next: [],
              relations: ["transformer"] },

            // Agent核心组件
            { id: "planning", name: "规划模块", category: "agent", level: 3,
              desc: "将复杂任务拆解为子步骤，动态调整执行路径的能力。是Agent处理长链路复杂任务的核心，决定了Agent能处理任务的复杂度。",
              role: "Agent的「战略部」，负责拆解任务、制定路线",
              prereq: ["agent", "cot"],
              next: ["react", "plan-execute", "reflection"],
              relations: ["agent", "cot", "react"] },

            { id: "memory", name: "记忆系统", category: "agent", level: 3,
              desc: "Agent的核心组件，解决大模型上下文窗口有限的问题。经典分为四层：工作记忆、短期记忆、长期记忆、程序记忆。",
              role: "支撑长任务执行，让Agent拥有「记性」",
              prereq: ["agent"],
              next: ["memory-layers", "rag", "embedding"],
              relations: ["agent", "rag", "embedding"] },

            { id: "toolcall", name: "工具调用", category: "agent", level: 3,
              desc: "Function Calling。提前给模型定义工具的名称、参数、功能描述，模型自主判断何时调用、传什么参数，解析返回结果。",
              role: "Agent的「手脚」，连接外部世界的核心接口",
              prereq: ["agent"],
              next: ["mcp", "react"],
              relations: ["agent", "react", "mcp"] },

            // ===== 第4层：进阶技术 =====
            { id: "react", name: "ReAct 框架", category: "agent", level: 4,
              desc: "推理+行动交替进行的经典Agent范式。每一步先思考要做什么、为什么，再调用工具，最后根据结果继续推理。",
              role: "单Agent的标准执行范式，边想边做灵活度高",
              prereq: ["planning", "toolcall"],
              next: ["multiagent"],
              relations: ["planning", "toolcall", "multiagent"] },

            { id: "plan-execute", name: "Plan-and-Execute", category: "agent", level: 4,
              desc: "先规划后执行的Agent架构：先一次性生成完整执行计划，再分步逐项执行。适合任务边界清晰、步骤明确的场景。",
              role: "结构化任务首选架构，执行路径可控",
              prereq: ["planning"],
              next: [],
              relations: ["planning", "react"] },

            { id: "reflection", name: "反思机制", category: "agent", level: 4,
              desc: "任务完成或失败后，让模型复盘问题、总结经验、存入记忆。通过自我反思提升后续任务的成功率，实现闭环进化。",
              role: "Agent的「复盘能力」，实现自我迭代",
              prereq: ["planning"],
              next: [],
              relations: ["planning", "memory"] },

            { id: "memory-layers", name: "记忆分层体系", category: "agent", level: 4,

        // 面试核心节点
        const interviewKeyNodes = [

            "agent-security", "agent-reliability", "cot", "lora", "sft"
        ];

        // 学习路径顺序（按层级）
        const learningPathOrder = [
            "math-foundation", "dl-foundation", "llm", "agent",
            "transformer", "attention", "bpe", "prompt-engineering",
            "pretrain", "sft", "rlhf", "emergence", "cot",
            "planning", "memory", "toolcall",
            "react", "plan-execute", "reflection", "memory-layers",
            "rag", "embedding", "lora", "dpo", "context-window",
            "mcp", "multiagent", "langchain",
            "quantization", "agent-evaluation", "agent-security",
            "agent-reliability", "agent-vs-chatbot"
        ];

        // 生成连线数据
        const linksData = [];
        const nodeMap = {};
        nodesData.forEach(n => nodeMap[n.id] = n);
        
        nodesData.forEach(node => {
            if (node.relations) {
                node.relations.forEach(targetId => {
                    const exists = linksData.some(l => 
                        (l.source === node.id && l.target === targetId) ||
                        (l.source === targetId && l.target === node.id)
                    );
                    if (!exists && nodeMap[targetId]) {
                        linksData.push({ source: node.id, target: targetId });
                    }
                });
            }
        });

        // ========== D3 分层力导向图 ==========
        const container = document.getElementById('graph-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select("#graph-container").append("svg");
        const g = svg.append("g");

        // 缩放
        const zoom = d3.zoom()
            .scaleExtent([0.3, 2.5])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);

        // 颜色映射
        const colorMap = {
            base: "#34d399",
            llm: "#60a5fa",
            agent: "#a78bfa"
        };

        // 层级对应的X坐标（百分比）
        const levelX = {
            1: width * 0.08,
            2: width * 0.26,
            3: width * 0.46,
            4: width * 0.66,
            5: width * 0.88
        };

        // 节点大小按层级
        const radiusMap = {
            1: 32,
            2: 26,
            3: 22,
            4: 20,
            5: 18
        };

        // 力模拟
        const simulation = d3.forceSimulation(nodesData)
            .force("link", d3.forceLink(linksData).id(d => d.id).distance(100).strength(0.5))
            .force("charge", d3.forceManyBody().strength(-500))
            .force("center", d3.forceCenter(width / 2, height / 2).strength(0.05))
            .force("collision", d3.forceCollide().radius(d => radiusMap[d.level] + 10))
            // 层级定位力：强制节点停留在对应层级的X位置
            .force("x", d3.forceX(d => levelX[d.level]).strength(0.8))
            .force("y", d3.forceY(height / 2).strength(0.1));

        // 连线
        const link = g.append("g")
            .selectAll("line")
            .data(linksData)
            .join("line")
            .attr("class", "link");

        // 节点组
        const node = g.append("g")
            .selectAll("g")
            .data(nodesData)
            .join("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // 节点圆圈
        node.append("circle")
            .attr("r", d => radiusMap[d.level])
            .attr("fill", d => colorMap[d.category])
            .attr("stroke", d => d3.color(colorMap[d.category]).brighter(0.5))
            .attr("stroke-width", 2)
            .attr("fill-opacity", 0.85);

        // 节点文字
        node.append("text")
            .attr("dy", d => radiusMap[d.level] + 14)
            .text(d => d.name);

        // 点击事件
        node.on("click", (event, d) => {
            event.stopPropagation();
            showDetail(d);
            highlightNode(d);
        });

        // 悬停提示
        node.append("title")
            .text(d => d.name);

        // 模拟更新
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // 拖拽函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // ========== 详情面板 ==========
        function showDetail(d) {
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('empty');
            
            const categoryLabel = {
                base: "核心基础",
                llm: "大模型技术",
                agent: "Agent 技术"
            };

            const categoryClass = {
                base: "category-base",
                llm: "category-llm",
                agent: "category-agent"
            };

            const levelText = {
                1: "第1层 · 入门基础",
                2: "第2层 · 核心原理",

                5: "第5层 · 生产落地"
            };

            // 前置知识标签
            let prereqHtml = '';
            if (d.prereq && d.prereq.length > 0) {
                prereqHtml = d.prereq.map(rid => {
                    const rNode = nodeMap[rid];
                    if (rNode) {
                        return `<span class="relation-tag" onclick="jumpToNode('${rid}')">${rNode.name}</span>`;
                    }
                    return '';
                }).join('');
            } else {
                prereqHtml = '<span style="color:#64748b; font-size:13px;">无前置知识，可直接入门</span>';
            }

            // 下一步学习
            let nextHtml = '';
            if (d.next && d.next.length > 0) {
                nextHtml = d.next.map(rid => {
                    const rNode = nodeMap[rid];
                    if (rNode) {
                        return `<span class="relation-tag next" onclick="jumpToNode('${rid}')">→ ${rNode.name}</span>`;
                    }
                    return '';
                }).join('');
            } else {
                nextHtml = '<span style="color:#64748b; font-size:13px;">本方向已到顶层</span>';
            }

            // 关联知识点
            let relationsHtml = '';
            if (d.relations && d.relations.length > 0) {
                relationsHtml = d.relations.map(rid => {
                    const rNode = nodeMap[rid];
                    if (rNode) {
                        return `<span class="relation-tag" onclick="jumpToNode('${rid}')">${rNode.name}</span>`;
                    }
                    return '';
                }).join('');

            panel.innerHTML = `
                <h2>${d.name}</h2>
                <span class="level-badge">${levelText[d.level]}</span>
                <span class="category ${categoryClass[d.category]}">${categoryLabel[d.category]}</span>

                <p>${d.desc}</p>
                
                <div class="section-title">地位与作用</div>
                <p>${d.role}</p>

                    <h5>📚 前置知识（建议先掌握）</h5>
                    ${prereqHtml}
                </div>

                <div class="path-box">
                    <h5>➡️ 下一步学习</h5>
                    ${nextHtml}
                </div>
                
                <div class="section-title">更多关联知识点</div>
                <div>${relationsHtml || '<p style="color:#64748b">暂无关联</p>'}</div>
            `;
        }

        function highlightNode(d) {
            // 普通模式下只高亮关联节点
            if (!isGuideMode && !isInterviewMode) {
                node.classed("dimmed", false);
                link.classed("dimmed", false);
                link.classed("highlight", false);

                if (!d) return;

                const relatedIds = new Set([d.id, ...(d.relations || [])]);
                node.classed("dimmed", n => !relatedIds.has(n.id));
                link.classed("dimmed", l => !(l.source.id === d.id || l.target.id === d.id));
                link.classed("highlight", l => l.source.id === d.id || l.target.id === d.id);
            }
        }

        function jumpToNode(nodeId) {
            const targetNode = nodesData.find(n => n.id === nodeId);
            if (targetNode) {
                showDetail(targetNode);
                highlightNode(targetNode);
                
                const currentTransform = d3.zoomTransform(svg.node());
                const scale = currentTransform.k;
                const tx = width / 2 - targetNode.x * scale;
                const ty = height / 2 - targetNode.y * scale;
                
                svg.transition().duration(500).call(
                    zoom.transform,
                    d3.zoomIdentity.translate(tx, ty).scale(scale)
                );
            }
        }

        // 点击空白处
        svg.on("click", () => {
            if (!isGuideMode && !isInterviewMode) {
                node.classed("dimmed", false);
                link.classed("dimmed", false);
                link.classed("highlight", false);
            }
        });

        // ========== 缩放控制 ==========
        function zoomIn() {
            svg.transition().duration(300).call(zoom.scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().duration(300).call(zoom.scaleBy, 0.7);
        }

        function resetZoom() {
            svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
        }

        // ========== 学习引导模式 ==========
        let isGuideMode = false;

            // 互斥：关闭面试模式

        function focusLevel(level) {
            // 重置
            node.classed("dimmed", true).classed("path-focus", false);
            link.classed("dimmed", true).classed("path-line", false);

            // 高亮当前层级及之前层级
            const levelSet = new Set(nodesData.filter(n => n.level <= level).map(n => n.id));
            node.filter(d => levelSet.has(d.id)).classed("dimmed", false);
            node.filter(d => d.level === level).classed("path-focus", true);

            // 高亮同层内的连线
            link.filter(l => levelSet.has(l.source.id) && levelSet.has(l.target.id))
                .classed("dimmed", false)
                .classed("path-line", true);

            // 自动缩放居中到该层
            const levelNodes = nodesData.filter(n => n.level === level);
            if (levelNodes.length > 0) {
                const centerX = levelX[level];
                const currentTransform = d3.zoomTransform(svg.node());
                const scale = Math.min(1, currentTransform.k);
                const tx = width / 2 - centerX * scale;
                
                svg.transition().duration(600).call(
                    zoom.transform,
                    d3.zoomIdentity.translate(tx, 0).scale(scale)
                );
            }
        }

                btn.textContent = '🎯 面试模式';
                exitInterviewMode();
            }
        }

        function enterInterviewMode() {
            const keySet = new Set(interviewKeyNodes);
            
            node.classed("dimmed", n => !keySet.has(n.id));
            node.classed("interview-focus", n => keySet.has(n.id));
            
            link.classed("dimmed", l => !(keySet.has(l.source.id) && keySet.has(l.target.id)));
            link.classed("highlight", l => keySet.has(l.source.id) && keySet.has(l.target.id));

            showInterviewGuide();
        }

        function exitInterviewMode() {
            node.classed("dimmed", false).classed("interview-focus", false);
            link.classed("dimmed", false).classed("highlight", false);

            document.getElementById('detail-panel').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <p>从左侧第一层开始学习</p>
                    <p style="font-size: 13px; margin-top: 4px;">点击节点查看详细解释</p>
                    <p style="font-size: 12px; margin-top: 12px; color: #34d399;">💡 推荐开启「学习引导模式」</p>
                </div>
            `;
            document.getElementById('detail-panel').classList.add('empty');
        }

        function showInterviewGuide() {
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('empty');

            panel.innerHTML = `
                <div class="start-guide" style="background: rgba(244, 114, 182, 0.1); border-color: rgba(244, 114, 182, 0.3);">
                    <h3 style="color: #f472b6;">🎯 Agent 面试核心路径</h3>
                    <p style="color: #fda4af;">图中高亮节点为高频考点，按优先级分四阶段掌握</p>
                </div>

                <div class="stage-card" style="border-left-color: #f472b6;">
                    <h4>第一阶段 · 基础必背</h4>
                    <div class="keypoint-item" onclick="jumpToNode('llm')">大语言模型核心原理与训练流程</div>
                    <div class="keypoint-item" onclick="jumpToNode('transformer')">Transformer架构与自注意力</div>
                    <div class="keypoint-item" onclick="jumpToNode('agent')">Agent定义与Chatbot的区别</div>
                </div>

                <div class="stage-card" style="border-left-color: #f472b6;">
                    <h4>第二阶段 · 核心高频</h4>
                    <div class="keypoint-item" onclick="jumpToNode('rag')">RAG完整架构与优化（重中之重）</div>
                    <div class="keypoint-item" onclick="jumpToNode('memory')">记忆系统设计与实现</div>
                    <div class="keypoint-item" onclick="jumpToNode('toolcall')">工具调用原理</div>
                    <div class="keypoint-item" onclick="jumpToNode('planning')">规划模块与任务拆解</div>
                    <div class="keypoint-item" onclick="jumpToNode('react')">ReAct框架执行流程</div>
                </div>

                <div class="stage-card" style="border-left-color: #f472b6;">
                    <h4>第三阶段 · 中高级进阶</h4>
                    <div class="keypoint-item" onclick="jumpToNode('multiagent')">多Agent协作模式与框架</div>
                    <div class="keypoint-item" onclick="jumpToNode('cot')">思维链与推理优化</div>
                    <div class="keypoint-item" onclick="jumpToNode('sft')">微调方案与LoRA原理</div>
                </div>

                <div class="stage-card" style="border-left-color: #f472b6;">
                    <h4>第四阶段 · 拉开差距</h4>
                    <div class="keypoint-item" onclick="jumpToNode('agent-security')">安全风险与权限管控</div>
                    <div class="keypoint-item" onclick="jumpToNode('agent-reliability')">生产级可靠性与成本优化</div>
                    <div class="keypoint-item" onclick="jumpToNode('agent-evaluation')">评估指标与Benchmark</div>
                </div>
            `;
        }

        // 响应窗口大小
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            svg.attr("width", w).attr("height", h);
            
            // 更新层级X坐标
            levelX[1] = w * 0.08;
            levelX[2] = w * 0.26;
            levelX[3] = w * 0.46;
            levelX[4] = w * 0.66;
            levelX[5] = w * 0.88;

            simulation.force("x", d3.forceX(d => levelX[d.level]).strength(0.8));
            simulation.alpha(0.3).restart();
        });

        svg.attr("width", width).attr("height", height);
    </script>
</body>
</html>
